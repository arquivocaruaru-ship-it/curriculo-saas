<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <!-- RESPONSIVO (ESSENCIAL) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ title if title else "Sistema de Currículos" }}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        h1, h2 {
            color: #2a7b88;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            background: #2a7b88;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }

        button:hover {
            background: #256872;
        }

        .btn-secondary {
            background: #ccc;
            color: #333;
        }

        .link {
            display: inline-block;
            margin-top: 10px;
            color: #2a7b88;
            text-decoration: none;
            font-weight: 500;
        }

        .card {
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* 📱 MOBILE */
        @media (max-width: 600px) {

            .container {
                margin: 10px;
                padding: 15px;
            }

            h1, h2 {
                font-size: 20px;
            }

            button {
                width: 100%;
            }

            .top-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }

    </style>
</head>

<body>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
